<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>채우미 맛집전용 원고 생성기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 15px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .section-title-with-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn-inline {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            margin-left: 10px;
            margin-top: 5px;
        }

        .copy-btn-inline:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .copy-btn-inline:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-reset:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-reset:active {
            transform: translateY(0);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 13px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 8px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 5px;
        }

        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }

        .result-box {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            min-height: 100px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
            color: #333;
            word-wrap: break-word;
            overflow-wrap: break-word;
            -webkit-overflow-scrolling: touch;
        }

        .result-box strong,
        .result-box .highlight {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .title-list {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .title-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            line-height: 1.5;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(102, 126, 234, 0.2);
        }

        .title-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .title-item.selected {
            background: #667eea;
            color: white;
        }

        .hidden {
            display: none;
        }

        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            line-height: 1.5;
        }

        .copy-btn {
            background: #28a745;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #218838;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .loading {
            text-align: center;
            padding: 15px;
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            color: #333;
        }

        .blog-url-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .blog-url-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        .blog-url-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-crawl {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-crawl:hover {
            background: #138496;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.4);
        }

        .btn-crawl:active {
            transform: translateY(0);
        }

        .btn-crawl:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>채우미 맛집전용 원고 생성기</h1>
        <p class="subtitle">네이버 블로그 검색 최적화 맛집 후기 작성 도구</p>

        <div style="text-align: right; margin-bottom: 15px;">
            <button class="btn-reset" onclick="resetAll()">초기화</button>
        </div>

        <div class="section" style="background: #fff3cd; border-left-color: #ffc107;">
            <div class="section-title">0. API 키 설정</div>
            <div class="warning" style="margin-bottom: 15px;">
                <strong>⚠️ 중요:</strong> API 키는 안전하게 관리하세요. 다른 사람과 공유하지 마세요.
            </div>
            <div class="input-group">
                <label>Gemini API 키</label>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." style="width: 100%;">
                    <button class="btn-crawl" onclick="toggleApiKeyVisibility()" style="width: 100%; padding: 10px; font-size: 13px;">보기/숨기기</button>
                </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;">
                <button class="btn btn-secondary" onclick="saveApiKey()" style="margin-top: 0;">API 키 저장</button>
                <button class="btn btn-secondary" onclick="downloadConfig()" style="margin-top: 0;">설정 파일 다운로드</button>
                <label class="btn btn-secondary" style="margin-top: 0; cursor: pointer; text-align: center;">
                    설정 파일 불러오기
                    <input type="file" id="configFileInput" accept=".json" style="display: none;" onchange="loadConfigFile(event)">
                </label>
            </div>
            <div id="apiKeyStatus" style="margin-top: 10px; padding: 10px; border-radius: 8px; display: none;"></div>
        </div>

        <div class="section">
            <div class="section-title">1. 입력 데이터</div>
            
            <div class="input-group">
                <label style="margin-bottom: 10px;">작성 시점 선택</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="afterVisit" name="visitType" value="after" checked>
                        <label for="afterVisit">다녀온 후 작성</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="beforeVisit" name="visitType" value="before">
                        <label for="beforeVisit">가기 전 작성 (체험단용)</label>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <label>메인 키워드</label>
                <input type="text" id="mainKeyword" placeholder="예: 강남 맛집, 홍대 맛집 등">
            </div>

            <div class="input-group">
                <label>매장명</label>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="text" id="storeName" placeholder="예: 맛있는집, 고기집 등" style="width: 100%;">
                    <button class="btn-crawl" onclick="autoCollectBlogPosts()" id="autoCollectBtn" style="width: 100%; padding: 12px; font-size: 14px;">자동 수집</button>
                </div>
                <div style="margin-top: 8px; font-size: 12px; color: #666;">
                    💡 매장명을 입력하고 "자동 수집" 버튼을 클릭하면 네이버 블로그 상위 3개 글이 자동으로 수집됩니다.
                    <br>
                    ⚠️ 자동 수집이 실패할 경우: 
                    <button onclick="openNaverSearch()" style="background: #17a2b8; color: white; border: none; padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 5px;">네이버 검색 열기</button>
                    네이버 블로그 검색 결과 페이지에서 상위 3개 블로그 URL을 복사하여 아래 참고글 URL 입력란에 붙여넣고 "수집" 버튼을 클릭하세요.
                </div>
            </div>

            <div class="input-group">
                <label>참고 블로그 글 1</label>
                <div class="blog-url-group">
                    <input type="text" id="blogUrl1" class="blog-url-input" placeholder="https://blog.naver.com/아이디/1234567890">
                    <button class="btn-crawl" onclick="crawlBlogToTextarea(1)" style="width: 100%; padding: 10px; font-size: 13px;">수집</button>
                </div>
                <textarea id="reference1" placeholder="참고할 블로그 글 내용을 입력하세요"></textarea>
            </div>

            <div class="input-group">
                <label>참고 블로그 글 2</label>
                <div class="blog-url-group">
                    <input type="text" id="blogUrl2" class="blog-url-input" placeholder="https://blog.naver.com/아이디/1234567890">
                    <button class="btn-crawl" onclick="crawlBlogToTextarea(2)" style="width: 100%; padding: 10px; font-size: 13px;">수집</button>
                </div>
                <textarea id="reference2" placeholder="참고할 블로그 글 내용을 입력하세요"></textarea>
            </div>

            <div class="input-group">
                <label>참고 블로그 글 3</label>
                <div class="blog-url-group">
                    <input type="text" id="blogUrl3" class="blog-url-input" placeholder="https://blog.naver.com/아이디/1234567890">
                    <button class="btn-crawl" onclick="crawlBlogToTextarea(3)" style="width: 100%; padding: 10px; font-size: 13px;">수집</button>
                </div>
                <textarea id="reference3" placeholder="참고할 블로그 글 내용을 입력하세요"></textarea>
            </div>

            <div class="input-group">
                <label>방문 일시/동행</label>
                <input type="text" id="visitInfo" placeholder="예: 주말 저녁, 친구와">
            </div>

            <div class="input-group">
                <label>주문 메뉴</label>
                <input type="text" id="menu" placeholder="예: 삼겹살 2인분, 김치찌개">
            </div>

            <div class="input-group">
                <label>맛/특징 메모</label>
                <textarea id="tasteMemo" placeholder="예: 고기를 직원이 구워줌, 육즙이 많음, 밑반찬 명이나물 맛있음"></textarea>
            </div>

            <button class="btn" onclick="generateTitles()">제목 5개 생성하기</button>
        </div>

        <div id="titleSection" class="section hidden">
            <div class="section-title">2. 제목 선택</div>
            <div id="titleList" class="title-list"></div>
            <div id="selectedTitleDisplay" class="hidden" style="margin-top: 15px; padding: 12px; background: #e7f3ff; border-radius: 8px; border-left: 4px solid #667eea;">
                <div style="font-weight: bold; margin-bottom: 10px; color: #333;">선택된 제목:</div>
                <div id="selectedTitleText" style="color: #555; font-size: 15px;"></div>
            </div>
            <button id="generateContentBtn" class="btn hidden" onclick="generateContent()" style="margin-top: 15px;">포스팅 원고 생성하기</button>
            <button class="btn btn-secondary" onclick="resetTitles()" style="margin-top: 10px;">다시 생성하기</button>
        </div>

        <div id="contentSection" class="section hidden">
            <div class="section-title section-title-with-button">
                <span>3. 생성된 본문</span>
                <button class="copy-btn-inline" onclick="copyContent()">생성된글 복사</button>
            </div>
            <div id="contentResult" class="result-box"></div>
        </div>
    </div>

    <script>
        // Gemini 2.5 Flash 모델 사용
        const GEMINI_MODEL = 'gemini-2.5-flash';
        
        let GEMINI_API_KEY = '';
        
        function getGeminiApiUrl() {
            if (!GEMINI_API_KEY) {
                throw new Error('API 키가 설정되지 않았습니다. 먼저 API 키를 입력하고 저장해주세요.');
            }
            return `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
        }
        
        function loadApiKey() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                GEMINI_API_KEY = savedKey;
                document.getElementById('apiKeyInput').value = savedKey;
                showApiKeyStatus('저장된 API 키가 로드되었습니다.', 'success');
            } else {
                showApiKeyStatus('API 키를 입력하고 저장해주세요.', 'warning');
            }
        }
        
        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                alert('API 키를 입력해주세요.');
                return;
            }
            GEMINI_API_KEY = apiKey;
            localStorage.setItem('gemini_api_key', apiKey);
            showApiKeyStatus('API 키가 저장되었습니다.', 'success');
        }
        
        function toggleApiKeyVisibility() {
            const input = document.getElementById('apiKeyInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        function showApiKeyStatus(message, type) {
            const statusDiv = document.getElementById('apiKeyStatus');
            statusDiv.style.display = 'block';
            statusDiv.textContent = message;
            statusDiv.style.background = type === 'success' ? '#d4edda' : '#fff3cd';
            statusDiv.style.border = type === 'success' ? '1px solid #c3e6cb' : '1px solid #ffc107';
            statusDiv.style.color = type === 'success' ? '#155724' : '#856404';
            setTimeout(() => { if (type === 'success') statusDiv.style.display = 'none'; }, 3000);
        }
        
        function downloadConfig() {
            const apiKey = document.getElementById('apiKeyInput').value.trim() || GEMINI_API_KEY;
            if (!apiKey) { alert('저장할 API 키가 없습니다.'); return; }
            const config = { gemini_api_key: apiKey, gemini_model: GEMINI_MODEL, saved_at: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'config.json';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }
        
        function loadConfigFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const config = JSON.parse(e.target.result);
                    if (config.gemini_api_key) {
                        GEMINI_API_KEY = config.gemini_api_key;
                        document.getElementById('apiKeyInput').value = config.gemini_api_key;
                        localStorage.setItem('gemini_api_key', config.gemini_api_key);
                        showApiKeyStatus('설정 파일이 로드되었습니다.', 'success');
                    }
                } catch (error) { alert('설정 파일을 읽는 중 오류가 발생했습니다.'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        window.addEventListener('DOMContentLoaded', loadApiKey);

        const CORS_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://cors-anywhere.herokuapp.com/',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://thingproxy.freeboard.io/fetch/'
        ];

        let selectedTitle = '';
        let mainKeyword = '';
        let experienceData = {};

        async function generateTitles() {
            const keyword = document.getElementById('mainKeyword').value.trim();
            const storeName = document.getElementById('storeName').value.trim();
            const ref1 = document.getElementById('reference1').value.trim();
            const ref2 = document.getElementById('reference2').value.trim();
            const ref3 = document.getElementById('reference3').value.trim();
            const visitInfo = document.getElementById('visitInfo').value.trim();
            const menu = document.getElementById('menu').value.trim();
            const tasteMemo = document.getElementById('tasteMemo').value.trim();
            const visitType = document.querySelector('input[name="visitType"]:checked').value;

            if (!keyword) {
                alert('메인 키워드를 입력해주세요.');
                return;
            }

            mainKeyword = keyword;
            experienceData = { visitType, storeName, visitInfo, menu, tasteMemo, ref1, ref2, ref3 };

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '제목 생성 중...';

            const titleList = document.getElementById('titleList');
            titleList.innerHTML = '<div class="loading">제목을 생성하고 있습니다. 잠시만 기다려주세요...</div>';
            document.getElementById('titleSection').classList.remove('hidden');

            try {
                // 네이버 홈판 스타일 프롬프트로 교체
                const prompt = `당신은 네이버 홈판(연예/패션/뷰티) 스타일의 클릭을 부르는 제목 작가입니다. 
아래의 [핵심 공식]과 [작성 규칙]을 완벽히 준수하여, 입력된 맛집 정보를 바탕으로 제목 5개를 생성하세요.

# 핵심 공식
[과거 역경/독특한 배경] + [현재 성공/주목] + "요즘/지금/아직도" + [궁금증 유발 질문형]

# 필수 구조 요소
1. 시간적 대비 구조 (과거 → 현재)
- 연결어: "했는데", "했지만", "한 후", "하다가"
2. 호기심 유발 결말
- 필수 패턴: "요즘 [긍정형용사] 이유는?", "왜 아직도 매력적일까?", "이거 때문이네", "이거 때문이였네"
- 긍정형용사: 핫한, 매력적인, 멋있는, 예쁜, 빛나는, 대세인, 사랑받는
3. 숫자 및 디테일 활용: 나이, 횟수, 금액, 구체적 장소 등 포함
4. 문체 특징: 말줄임표 ".." 사용, 구어체(~했다던, ~했다는데), 강조 부사(너무, 확, 아직도)

# 콘텐츠 앵커 (맛집용으로 변형 가능)
- "의 맛", "의 비주얼", "의 분위기", "의 비밀" 등

# 입력 데이터
- 메인 키워드: ${keyword}
- 매장명: ${storeName}
- 메뉴: ${menu}
- 특징: ${tasteMemo}

# 작성 규칙
- 번호와 제목만 5개 출력.
- ".." 말줄임표를 자연스럽게 배치.
- 70자 이상의 너무 긴 제목 지양.

제목 5개를 생성해주세요.`;

                const response = await fetch(getGeminiApiUrl(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const generatedText = data.candidates[0].content.parts[0].text;
                const titles = parseTitles(generatedText);
                displayTitles(titles);
            } catch (error) {
                alert('제목 생성 중 오류 발생: ' + error.message);
                document.getElementById('titleSection').classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = '제목 5개 생성하기';
            }
        }

        function parseTitles(text) {
            const lines = text.split('\n').filter(line => line.trim());
            const titles = [];
            lines.forEach(line => {
                const match = line.match(/^\d+\.\s*(.+)$/);
                if (match) titles.push(match[0].trim());
            });
            return titles.length === 0 ? lines.slice(0, 5).map((l, i) => `${i+1}. ${l.trim()}`) : titles.slice(0, 5);
        }

        function displayTitles(titles) {
            const titleList = document.getElementById('titleList');
            titleList.innerHTML = '';
            titles.forEach((title, index) => {
                const titleItem = document.createElement('div');
                titleItem.className = 'title-item';
                titleItem.textContent = title;
                titleItem.onclick = () => selectTitle(title, index);
                titleList.appendChild(titleItem);
            });
            document.getElementById('selectedTitleDisplay').classList.add('hidden');
            document.getElementById('generateContentBtn').classList.add('hidden');
            selectedTitle = '';
        }

        function selectTitle(title, index) {
            selectedTitle = title;
            const items = document.querySelectorAll('.title-item');
            items.forEach((item, i) => item.classList.toggle('selected', i === index));
            document.getElementById('selectedTitleText').textContent = title.replace(/^\d+\.\s*/, '');
            document.getElementById('selectedTitleDisplay').classList.remove('hidden');
            document.getElementById('generateContentBtn').classList.remove('hidden');
            document.getElementById('contentSection').classList.add('hidden');
        }

        async function generateContent() {
            if (!selectedTitle) return;
            const generateContentBtn = document.getElementById('generateContentBtn');
            generateContentBtn.disabled = true;
            generateContentBtn.textContent = '원고 생성 중...';
            const contentResult = document.getElementById('contentResult');
            contentResult.innerHTML = '<div class="loading">본문을 생성하고 있습니다. 잠시만 기다려주세요...</div>';
            document.getElementById('contentSection').classList.remove('hidden');
            document.getElementById('contentSection').scrollIntoView({ behavior: 'smooth' });

            try {
                // 본문 생성 프롬프트는 기존 로직 유지
                const prompt = `# 역할 지정
당신은 네이버 블로그 검색 로직(C-RANK, DIA+)에 최적화된 맛집 전문 작가입니다. 
제공된 참고 글의 문체와 흐름을 분석하여, 나의 경험 데이터를 바탕으로 표절률 0%의 창의적인 글을 작성하세요.

# 중요 제약 사항
1. 이모지 절대 사용 금지.
2. 마크다운 문법(**굵게**, ## 등) 절대 사용 금지. 오직 줄글과 엔터로만 작성.
3. 사진 위치는 (사진: 설명) 형식으로 표시.
4. 문단은 3~4줄 내외로 짧게.
5. 강조는 <<텍스트>> 형식 사용.

선택한 제목: ${selectedTitle}
입력 정보: ${JSON.stringify(experienceData)}

위 정보를 바탕으로 생생한 맛집 후기 포스팅을 작성해주세요.`;

                const response = await fetch(getGeminiApiUrl(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const generatedText = data.candidates[0].content.parts[0].text;
                const titleWithoutNumber = selectedTitle.replace(/^\d+\.\s*/, '');
                
                function convertHighlightToHTML(text) {
                    text = text.replace(/<<([^>>]+)>>/g, '<strong>$1</strong>');
                    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                    text = text.replace(/\n/g, '<br>');
                    return text;
                }
                
                contentResult.innerHTML = convertHighlightToHTML(titleWithoutNumber + '<br><br>' + generatedText);
            } catch (error) {
                alert('본문 생성 오류: ' + error.message);
            } finally {
                generateContentBtn.disabled = false;
                generateContentBtn.textContent = '포스팅 원고 생성하기';
            }
        }

        function resetAll() {
            if (confirm('모든 내용을 초기화하시겠습니까?')) location.reload();
        }

        function resetTitles() {
            document.getElementById('titleSection').classList.add('hidden');
            document.getElementById('contentSection').classList.add('hidden');
            selectedTitle = '';
        }

        function copyContent() {
            const content = document.getElementById('contentResult').innerText;
            navigator.clipboard.writeText(content).then(() => alert('클립보드에 복사되었습니다!'));
        }

        async function autoCollectBlogPosts() {
            const storeName = document.getElementById('storeName').value.trim();
            if (!storeName) { alert('매장명을 입력해주세요.'); return; }
            const btn = document.getElementById('autoCollectBtn');
            btn.disabled = true; btn.textContent = '검색 중...';
            try {
                const searchQuery = encodeURIComponent(storeName);
                const searchUrl = `https://search.naver.com/search.naver?where=post&query=${searchQuery}`;
                const html = await fetchWithProxy(searchUrl);
                const urls = extractBlogUrlsFromSearch(html);
                if (urls.length === 0) throw new Error('블로그를 찾지 못했습니다.');
                for (let i = 0; i < Math.min(urls.length, 3); i++) {
                    document.getElementById(`blogUrl${i+1}`).value = urls[i];
                    await crawlBlogToTextareaInternal(i+1, urls[i]);
                }
                alert('자동 수집 완료!');
            } catch (error) { alert(error.message); }
            finally { btn.disabled = false; btn.textContent = '자동 수집'; }
        }

        function openNaverSearch() {
            const name = document.getElementById('storeName').value.trim();
            if (name) window.open(`https://search.naver.com/search.naver?where=post&query=${encodeURIComponent(name)}`, '_blank');
        }

        function extractBlogUrlsFromSearch(html) {
            const urls = [];
            const matches = html.matchAll(/https?:\/\/blog\.naver\.com\/[^\/\s"']+\/\d+/g);
            for (const match of matches) {
                if (!urls.includes(match[0])) urls.push(match[0]);
                if (urls.length >= 3) break;
            }
            return urls;
        }

        async function crawlBlogToTextareaInternal(num, url) {
            const textarea = document.getElementById(`reference${num}`);
            let targetUrl = url.replace('blog.naver.com/', 'm.blog.naver.com/');
            const html = await fetchWithProxy(targetUrl);
            const content = parseBlogContent(html);
            textarea.value = content || '내용 추출 실패';
        }

        async function crawlBlogToTextarea(num) {
            const url = document.getElementById(`blogUrl${num}`).value.trim();
            if (!url) return;
            const btn = event.target;
            btn.disabled = true; btn.textContent = '수집 중...';
            try { await crawlBlogToTextareaInternal(num, url); alert('수집 성공!'); }
            catch (e) { alert(e.message); }
            finally { btn.disabled = false; btn.textContent = '수집'; }
        }

        async function fetchWithProxy(url) {
            for (const proxy of CORS_PROXIES) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(url));
                    if (response.ok) return await response.text();
                } catch (e) { continue; }
            }
            throw new Error('프록시 연결 실패');
        }

        function parseBlogContent(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const element = doc.querySelector('.se_component_wrap, .se-main-container, .post-view');
            return element ? element.innerText.replace(/\s+/g, ' ').trim() : null;
        }
    </script>
</body>
